name: CI pipeline

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'readme.md'
      - 'myapp/**'
      - 'docker-compose.yaml'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract Commit SHA for Image Tag
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/flask-app:${{ steps.vars.outputs.sha_short }},${{ secrets.DOCKER_USERNAME }}/flask-app:latest
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/flask-app:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/flask-app:buildcache,mode=max