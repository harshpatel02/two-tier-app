apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
spec:
  replicas: {{ .Values.db.replicaCount }}
  selector:
    matchLabels:
      type: db
  template:
    metadata:
      labels:
        name: redis
        type: db
    spec:
      containers:
        - name: redis
          image: redis:alpine
          ports:
            - containerPort: 6379
          envFrom:
            - configMapRef:
                name: redis-config
          livenessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            limits:
              memory: "128Mi"